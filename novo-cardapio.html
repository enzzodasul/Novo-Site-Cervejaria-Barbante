<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Cardápio Barbante</title>

<link
rel="stylesheet"
href="css/cardapio-style.css">

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- HEADER -->

<header class="header">

<div class="logo-container">

    <a id="logoHome" href="#">
        <img
        src="imagens/logo-branca-barbante.png"
        alt="Carta Barbante"
        class="logo">
        
    </a>

</div>

<h1>Cardápio</h1>

<p>Mais de 160 anos de história e tradição!
</p>

</div>

</div>

<div class="acoes-header">

    

    <button
    id="btnCarrinho"
    class="btn-carrinho">

        <i class="fa-solid fa-cart-shopping"></i>

        <span id="contadorCarrinho">
            0
        </span>

    </button>

</div>



</header>

<!-- BUSCA -->

<section class="busca-container">

<div class="busca-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="campoBusca"
placeholder="Buscar produto...">

</div>

</section>

<!-- CATEGORIAS -->

<section class="categorias">

<button
class="categoria-btn active"
data-categoria="Todos">

Todos

</button>


<button
class="categoria-btn"
data-categoria="Chopes">

Chopes

</button>

<button
class="categoria-btn"
data-categoria="Doses">

Doses

</button>

<button
class="categoria-btn"
data-categoria="Drinks">

Drinks 

</button>

<button
class="categoria-btn"
data-categoria="Drinks-sem-alcool">

Drinks(Sem Álcool)

</button>

<button
class="categoria-btn"
data-categoria="Bebidas">

Bebidas

</button>

<button
class="categoria-btn"
data-categoria="Vinhos">

Vinhos

</button>



<button
class="categoria-btn"
data-categoria="Entradas">

Entradas

</button>

<button
class="categoria-btn"
data-categoria="Principais">

Pratos

</button>

<button
class="categoria-btn"
data-categoria="Acompanhamentos">

Acomp. Adicionais

</button>


<button
class="categoria-btn"
data-categoria="kids">

Kids

</button>

<button
class="categoria-btn"
data-categoria="Hambúrgueres">

Hambúrguer

</button>

<button
class="categoria-btn"
data-categoria="Pizzas">

Pizzas (Salgadas)

</button>

<button
class="categoria-btn"
data-categoria="Pizzas-doce">

Pizzas (Doces)

</button>



<button
class="categoria-btn"
data-categoria="Sobremesas">

Sobremesas

</button>

</section>

<!-- GRID PRODUTOS -->

<main>

<section
id="produtos"
class="produtos-grid">

<!-- GERADO PELO JAVASCRIPT -->

</section>

</main>

<!-- MODAL PRODUTO -->

<div
id="modalProduto"
class="modal">

<div class="modal-content">

<button
id="fecharModal"
class="fechar-modal">

×

</button>

<img
id="modalImagem"
src=""
alt="Produto">

<div class="modal-info">

<h2 id="modalNome"></h2>

<p id="modalDescricao"></p>

<div
id="modalPreco"
class="modal-preco">

</div>

<div class="quantidade-container">

<button
id="menosQtd">

−

</button>

<span id="quantidadeAtual">

1

</span>

<button
id="maisQtd">

+

</button>

</div>

<button
id="btnAdicionarCarrinho"
class="btn-adicionar">

Adicionar ao Carrinho

</button>

</div>

</div>

</div>

<!-- CARRINHO -->

<div
id="carrinho"
class="carrinho">

<div class="carrinho-header">

<h2>

Seu Pedido

</h2>

<button
id="fecharCarrinho">

×

</button>

</div>

<div
id="itensCarrinho"
class="itens-carrinho">
</div>

<h3 style="padding:10px 15px;">
Pedidos da Mesa
</h3>

<div
id="historicoPedidos">
</div>

<div class="carrinho-footer">

<input
type="text"
id="nomeCliente"
class="campo-mesa"
placeholder="Seu nome">

<input
type="text"
id="telefoneCliente"
class="campo-mesa"
placeholder="Telefone celular">

<div class="total-container">

<span>Total</span>

<strong id="valorTotal">

R$ 0,00

</strong>

</div>

<button
id="btnFinalizar"
class="btn-finalizar">

Finalizar Pedido

</button>

</div>

</div>

<!-- OVERLAY -->

<div
id="overlay"
class="overlay">

</div>

<!-- LOADING -->

<div
id="loading"
class="loading">

<div class="spinner"></div>

</div>







<!-- SCRIPTS -->






















<script src="data/cardapio.js"></script>

<script src="js/app.js"></script>

<script>

const token =
new URLSearchParams(
    window.location.search
).get("token");

const logoHome =
document.getElementById("logoHome");

if(logoHome){

    if(token){

        logoHome.href =
        "index.html?token=" + token;

    }else{

        logoHome.href =
        "index.html";
    }
}

</script>

</body>

</html>
