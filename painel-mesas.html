<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Painel de Mesas - Barbante</title>

<link
rel="stylesheet"
href="css/painel-mesas.css">

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<header class="topo">

<img
src="imagens/logo-branca-barbante.png"
class="logo">

<h1>Painel de Mesas</h1>

</header>

<section class="resumo">

<div class="card-resumo">
<h3>Mesas Livres</h3>
<span id="livres">0</span>
</div>

<div class="card-resumo">
<h3>Mesas Ocupadas</h3>
<span id="ocupadas">0</span>
</div>

<div class="card-resumo">
<h3> valor total Comandas em Aberto</h3>
<span id="faturamento">R$ 0,00</span>
</div>

</section>

<main>

<div
id="gridMesas"
class="grid-mesas">
</div>

</main>

<div
id="modalMesa"
class="modal">

<div class="modal-content">

<button
id="fecharModal"
class="fechar-modal">

✕

</button>

<h2 id="tituloMesa">

Mesa

</h2>

<div id="historicoMesa">

</div>

</div>

</div>

<div
id="overlay"
class="overlay">
</div>

<script>

const API =
"http://127.0.0.1:5000";

const grid =
document.getElementById(
"gridMesas"
);

const modal =
document.getElementById(
"modalMesa"
);

const overlay =
document.getElementById(
"overlay"
);

const tituloMesa =
document.getElementById(
"tituloMesa"
);

const historicoMesa =
document.getElementById(
"historicoMesa"
);




async function carregarMesas(){

    // Se o modal estiver aberto,
    // não atualiza as mesas
    // para não fechar a janela
    if(modal.classList.contains("active")){
        return;
    }

    const resposta =
    await fetch(
        API + "/mesas"
    );

    const mesas =
    await resposta.json();

    grid.innerHTML = "";

    let livres = 0;
    let ocupadas = 0;
    let faturamento = 0;

    mesas.forEach(mesa=>{

        faturamento +=
        Number(
            mesa.total_conta
        );

        let classe =
        "mesa-livre";

        if(
            Number(
                mesa.total_conta
            ) > 0
        ){
            classe =
            "mesa-ocupada";

            ocupadas++;

        }else{

            livres++;
        }

        const card =
        document.createElement(
            "div"
        );

        card.className =
        "mesa " + classe;

        card.innerHTML = `
            <div class="numero-mesa">
                Mesa ${mesa.numero}
            </div>

            <div class="valor-mesa">
                R$ ${Number(
                    mesa.total_conta
                ).toFixed(2)}
            </div>
        `;

        card.onclick =
        ()=>abrirMesa(
            mesa.numero
        );

        grid.appendChild(
            card
        );

    });

    document
    .getElementById(
        "livres"
    ).textContent =
    livres;

    document
    .getElementById(
        "ocupadas"
    ).textContent =
    ocupadas;

    document
    .getElementById(
        "faturamento"
    ).textContent =
    faturamento.toLocaleString(
        "pt-BR",
        {
            style:"currency",
            currency:"BRL"
        }
    );

}


/* ******************************************************** */

async function abrirMesa(numero){

    tituloMesa.textContent =
    "Mesa " + numero;

    const resposta =
    await fetch(
        API + "/mesa/" + numero
    );

    const pedidos =
    await resposta.json();

    let html = "";

    let totalMesa = 0;

    pedidos.forEach(pedido=>{

        totalMesa += Number(
            pedido.total
        );

        html += `
        <div class="pedido">

            <div class="pedido-topo">

                <h3>
                    Pedido #${pedido.id}
                </h3>

                <span class="status">
                    ${pedido.status}
                </span>

            </div>

            <div style="margin-top:10px;">
                👤 <strong>
                    ${pedido.nome_cliente || "Não informado"}
                </strong>
            </div>

            <div style="margin-bottom:12px;">
                📞 ${pedido.telefone_cliente || "-"}
            </div>
        `;

        pedido.itens.forEach(item=>{

            html += `

            <div class="item-pedido">

                <strong>
                    ${item.quantidade}x
                    ${item.produto}
                </strong>

                <div class="valor-unitario">
                    R$ ${Number(
                        item.preco
                    ).toFixed(2)}
                    cada
                </div>

                <div class="subtotal-item">
                    Subtotal:
                    R$ ${Number(
                        item.subtotal
                    ).toFixed(2)}
                </div>

                <button
                class="btn-expandir"
                onclick="toggleItens(this)">
                    ▼ Ver unidades
                </button>

                <div class="lista-unidades">

                    ${
                        Array.from(
                            {
                                length:
                                item.quantidade
                            },
                            ()=>`
                            <div class="unidade-item">
                                • ${item.produto}
                                - R$ ${Number(
                                    item.preco
                                ).toFixed(2)}
                            </div>
                            `
                        ).join("")
                    }

                </div>

            </div>
            `;

        });

        html += `

            <div class="total-pedido">

                Total Pedido:
                R$ ${Number(
                    pedido.total
                ).toFixed(2)}

            </div>

        </div>
        `;

    });

    html += `

    <div class="total-mesa">

        TOTAL DA MESA

        <strong>

            R$ ${totalMesa.toFixed(2)}

        </strong>

    </div>

    <div class="acoes-mesa">

        <button
        class="btn-fechar-conta"
        onclick="fecharConta(${numero})">

            Fechar Conta

        </button>

    </div>
    `;

    historicoMesa.innerHTML =
    html;

    modal.classList.add(
        "active"
    );

    overlay.classList.add(
        "active"
    );

}

async function fecharConta(numero){

    const formaPagamento =
    prompt(
        "Forma de pagamento:\n\n" +
        "dinheiro\npix\ndebito\ncredito",
        "pix"
    );

    if(!formaPagamento){
        return;
    }

    const descontoValor =
    Number(
        prompt(
            "Desconto em R$",
            "0"
        )
    ) || 0;

    const descontoPercentual =
    Number(
        prompt(
            "Desconto em %",
            "0"
        )
    ) || 0;

    try{

        const resposta =
        await fetch(

            API +
            "/fechar-mesa/" +
            numero,

            {
                method:"POST",

                headers:{
                    "Content-Type":
                    "application/json"
                },

                body:JSON.stringify({

                    forma_pagamento:
                    formaPagamento,

                    desconto_valor:
                    descontoValor,

                    desconto_percentual:
                    descontoPercentual

                })

            }

        );

        const dados =
        await resposta.json();

        if(dados.sucesso){

            alert(

                "Conta fechada!\n\n" +

                "Valor Original: R$ " +

                dados.valor_original +

                "\n\nTotal Final: R$ " +

                dados.total_final

            );

            modal.classList.remove(
                "active"
            );

            overlay.classList.remove(
                "active"
            );

            carregarMesas();

        }else{

            alert(
                dados.erro
            );

        }

    }catch(erro){

        console.log(erro);

        alert(
            "Erro ao fechar conta."
        );

    }

}

function toggleItens(botao){

    const lista =
    botao.parentElement
    .querySelector(
        ".lista-unidades"
    );

    if(
        lista.style.display
        === "block"
    ){

        lista.style.display =
        "none";

        botao.innerHTML =
        "▼ Ver unidades";

    }else{

        lista.style.display =
        "block";

        botao.innerHTML =
        "▲ Ocultar unidades";
    }

}

document
.getElementById(
"fecharModal"
)
.onclick = ()=>{

    modal.classList.remove(
        "active"
    );

    overlay.classList.remove(
        "active"
    );

};

overlay.onclick = ()=>{

    modal.classList.remove(
        "active"
    );

    overlay.classList.remove(
        "active"
    );

};

carregarMesas();

setInterval(
    carregarMesas,
    5000
);


</script>





<!--SCRIPT PRA PODER FAZER BOTÃO DE VOLTAR FUNCIONAR SEM PERDER TOKEN-->
<script>

const token =
new URLSearchParams(
    window.location.search
).get("token");

if(token){

    document
    .getElementById("btnVoltar")
    .href =
    "index.html?token=" + token;
}

</script>





</body>
</html>
